name: FUTGG Objectives Crawler

on:
  schedule:
    # 한국시간 매일 02:00 = UTC 매일 17:00
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Run crawler
        run: |
          mkdir -p outputs
          python futgg_objective_crawler.py --out outputs --headless

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: futgg-objectives-result
          path: outputs/

      - name: Update latest files
        run: |
          mkdir -p latest
          mkdir -p latest_csv

          echo "=== outputs files before copy ==="
          ls -la outputs

          cp outputs/*.xlsx latest/objectives_latest.xlsx
          find outputs -maxdepth 1 -name "*.csv" -exec cp {} latest_csv/ \;

          echo "=== latest files ==="
          ls -la latest

          echo "=== latest_csv files ==="
          ls -la latest_csv

      - name: Commit latest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status --short
          git add -A latest latest_csv
          git status --short

          git commit -m "Update latest objectives result" || echo "No changes to commit"
          git push
