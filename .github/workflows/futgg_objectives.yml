name: FUTGG Objectives Crawler

on:
  schedule:
    # 한국시간 매일 02:00 = UTC 매일 17:00
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Run crawler
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p outputs
          echo "=== crawler start ==="
          date
          python -u futgg_objective_crawler.py --out outputs --headless
          echo "=== crawler end ==="
          date
          echo "=== outputs after crawler ==="
          ls -la outputs
          echo "=== outputs/latest_csv after crawler ==="
          ls -la outputs/latest_csv || true

      - name: Build poster summary JSON
        timeout-minutes: 3
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== build poster summary json start ==="
          date
          python -u build_poster_summary_json.py
          echo "=== build poster summary json end ==="
          date
          echo "=== outputs/latest_json after json build ==="
          ls -la outputs/latest_json || true

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: futgg-objectives-result
          path: outputs/

      - name: Update latest files
        run: |
          mkdir -p latest

          rm -rf latest_csv
          mkdir -p latest_csv

          rm -rf latest_json
          mkdir -p latest_json

          echo "=== outputs files before copy ==="
          ls -la outputs

          echo "=== outputs/latest_csv files before copy ==="
          ls -la outputs/latest_csv || true

          echo "=== outputs/latest_json files before copy ==="
          ls -la outputs/latest_json || true

          cp outputs/*.xlsx latest/objectives_latest.xlsx

          if [ -d outputs/latest_csv ]; then
            cp outputs/latest_csv/*.csv latest_csv/ || true
          fi

          if [ -d outputs/latest_json ]; then
            cp outputs/latest_json/*.json latest_json/ || true
          fi

          echo "=== latest files ==="
          ls -la latest

          echo "=== latest_csv files ==="
          ls -la latest_csv

          echo "=== latest_json files ==="
          ls -la latest_json

      - name: Commit latest files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status --short
          git add -A latest latest_csv latest_json
          git status --short

          git commit -m "Update latest objectives result and summary json" || echo "No changes to commit"
          git push
