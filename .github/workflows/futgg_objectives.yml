name: FUTGG Objectives Crawler

on:
  schedule:
    # 한국시간 매일 02:00 = UTC 매일 17:00
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Run crawler
        run: |
          mkdir -p outputs
          python futgg_objective_crawler.py --out outputs --headless

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: futgg-objectives-result
          path: outputs/

      - name: Update latest files
        run: |
          mkdir -p latest
          cp outputs/*.xlsx latest/objectives_latest.xlsx

      - name: Commit latest files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update latest objectives result
          file_pattern: latest/objectives_latest.xlsx
