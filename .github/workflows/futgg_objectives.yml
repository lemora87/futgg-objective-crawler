name: FUTGG Objectives Crawler

on:
  schedule:
    # 한국시간 매일 02:00 = UTC 매일 17:00
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Run crawler
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p outputs
          echo "=== crawler start ==="
          date
          python -u futgg_objective_crawler.py --out outputs --headless
          echo "=== crawler end ==="
          date
          echo "=== outputs after crawler ==="
          ls -la outputs

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: futgg-objectives-result
          path: outputs/

      - name: Update latest xlsx
        run: |
          mkdir -p latest

          echo "=== outputs files before copy ==="
          ls -la outputs

          cp outputs/*.xlsx latest/objectives_latest.xlsx

          echo "=== latest files ==="
          ls -la latest

      - name: Commit latest xlsx
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git status --short
          git add -A latest
          git status --short

          git commit -m "Update latest objectives xlsx" || echo "No changes to commit"
          git push
