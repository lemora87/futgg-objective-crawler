name: FUTGG Objectives Crawler

on:
  schedule:
    # 한국시간 매일 03:00 = UTC 매일 18:00
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Run crawler
        run: |
          mkdir -p outputs
          python futgg_objective_crawler.py --out outputs --headless

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: futgg-objectives-result
          path: outputs/

      - name: Check email secrets
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python - <<'PY'
          import os
          print("EMAIL_USER:", os.getenv("EMAIL_USER"))
          print("EMAIL_TO:", os.getenv("EMAIL_TO"))
          print("EMAIL_PASS length:", len(os.getenv("EMAIL_PASS", "")))
          PY

      - name: Send result by email
        continue-on-error: true
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WORKFLOW_NAME: FUTGG Objectives Crawler
          EMAIL_SUBJECT_PREFIX: FUT.GG Objectives 결과
        run: |
          python send_email_with_attachments.py

      - name: Update latest files
        run: |
          mkdir -p latest
          cp outputs/*.xlsx latest/objectives_latest.xlsx

      - name: Commit latest files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update latest objectives result
          file_pattern: latest/objectives_latest.xlsx
