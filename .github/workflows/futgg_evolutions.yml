name: FUTGG Evolutions Crawler

on:
  schedule:
    # 한국시간 매일 02:10 = UTC 매일 17:10
    - cron: "10 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Prepare analysis workbook
        run: |
          mkdir -p outputs
          cp futgg_evolutions_analysis_template.xlsx outputs/futgg_evolutions_analysis_updated.xlsx

      - name: Run evolution crawler
        run: |
          python futgg_evolution_crawler.py --out outputs --headless --update-analysis --analysis outputs/futgg_evolutions_analysis_updated.xlsx

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: futgg-evolutions-result
          path: outputs/

      - name: Update latest files
        run: |
          mkdir -p latest
          cp outputs/futgg_evolutions_analysis_updated.xlsx latest/evolutions_analysis_latest.xlsx
          cp outputs/futgg_evolutions_unified_*.xlsx latest/evolutions_raw_latest.xlsx

      - name: Commit latest files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update latest evolutions result
          file_pattern: latest/evolutions_analysis_latest.xlsx latest/evolutions_raw_latest.xlsx
