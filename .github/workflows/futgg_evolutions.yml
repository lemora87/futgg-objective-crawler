name: FUTGG Evolutions Crawler

on:
  schedule:
    # 한국시간 토요일 03:10 = UTC 금요일 18:10
    - cron: "10 18 * * 5"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Prepare analysis workbook
        run: |
          mkdir -p outputs
          cp futgg_evolutions_analysis_template.xlsx outputs/futgg_evolutions_analysis_updated.xlsx

      - name: Run evolution crawler
        run: |
          python futgg_evolution_crawler.py --out outputs --headless --update-analysis --analysis outputs/futgg_evolutions_analysis_updated.xlsx

      - name: Upload result files
        uses: actions/upload-artifact@v4
        with:
          name: futgg-evolutions-result
          path: outputs/
